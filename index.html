<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Благодійний фонд Петра Скрипки</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fa;
  color: #222;
}

.top-banner {
  width: 100%;
  max-height: 300px;
  object-fit: contain;
}

.intro, section {
  margin: 30px;
  background: white;
  padding: 20px;
  border-radius: 12px;
}

.gallery {
  display: flex;
  gap: 10px;
  justify-content: center;
}

.gallery img {
  width: 45%;
  border-radius: 10px;
}

/* КНОПКА */
.donate-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 110px;
  height: 110px;
  border-radius: 50%;
  overflow: hidden;
  z-index: 9999;
  box-shadow: 0 6px 18px rgba(0,0,0,0.4);
}

.donate-btn img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: #fff;
}

.donate-text {
  position: absolute;
  bottom: 5px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 4px 8px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: bold;
}
</style>
</head>

<body>

<img src="logo.jpg" class="top-banner">

<div class="intro">
<p>Я — Петро Скрипка...</p>

<div class="gallery">
<img src="images/foto6.jpg">
<img src="images/foto3.jpg">
</div>

<p>Метою цього марафону...</p>

<img src="images/foto4.jpg">

<p>
<a href="https://youtu.be/cwlptGNJJxc?si=oVTe1U4DoenVbUex" target="_blank">
Дивитися сюжет
</a>
</p>

</div>

<section>
<h2>Про фонд</h2>
<p>З перших днів війни...</p>
<p>Ми допомагаємо...</p>
</section>

<footer style="text-align:center;padding:20px;background:#1d3557;color:white;">
Благодійний фонд Петра Скрипки © 2026
</footer>

<!-- КРУГЛА КНОПКА -->
<a href="https://send.monobank.ua/jar/6qpTzTDwDe" target="_blank" class="donate-btn">
<img src="logo.jpg">
<div class="donate-text">Зробити донат</div>
</a>

</body>
</html>

<a href="https://send.monobank.ua/jar/6qpTzTDwDe" target="_blank"
id="donateBtn"
style="
position: fixed;
bottom: 20px;
right: 20px;
width: 110px;
height: 110px;
border-radius: 50%;
overflow: hidden;
z-index: 9999;
display: block;
box-shadow: 0 6px 18px rgba(0,0,0,0.4);
cursor: grab;
">

<img src="logo.jpg" style="
width:100%;
height:100%;
object-fit: contain;
background:#fff;
">

<span style="
position:absolute;
bottom:5px;
left:50%;
transform:translateX(-50%);
background: rgba(0,0,0,0.7);
color:white;
padding:4px 8px;
border-radius:999px;
font-size:12px;
font-weight:bold;
">
Зробити донат
</span>

</a>

<script>
let btn = document.getElementById("donateBtn");

let isDown = false;
let offsetX, offsetY;

btn.onmousedown = function(e){
  isDown = true;
  offsetX = e.clientX - btn.offsetLeft;
  offsetY = e.clientY - btn.offsetTop;
  btn.style.cursor = "grabbing";
};

document.onmousemove = function(e){
  if(!isDown) return;
  btn.style.left = (e.clientX - offsetX) + "px";
  btn.style.top = (e.clientY - offsetY) + "px";
  btn.style.right = "auto";
  btn.style.bottom = "auto";
};

document.onmouseup = function(){
  isDown = false;
  btn.style.cursor = "grab";
};
</script>
